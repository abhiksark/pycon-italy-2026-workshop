<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 760" font-family="Inter, system-ui, Arial, sans-serif">
  <style>
    .bg          { fill: #FAFAFA; }
    .cell        { fill: #F4F4F5; stroke: #18181B; stroke-width: 2; }
    .cell-active { fill: #E76F51; stroke: #18181B; stroke-width: 2; }
    .label       { font-family: 'Inter', 'Arial', sans-serif; font-size: 20px; font-weight: 600; fill: #18181B; }
    .label-muted { font-family: 'Inter', 'Arial', sans-serif; font-size: 14px; font-weight: 600; fill: #52525B; }
    .code        { font-family: 'JetBrains Mono', 'Source Code Pro', monospace; font-size: 18px; fill: #18181B; }
    .code-muted  { font-family: 'JetBrains Mono', 'Source Code Pro', monospace; font-size: 14px; fill: #52525B; }
    .arrow-muted  { stroke: #52525B; stroke-width: 2; fill: none; marker-end: url(#arrow-muted); }
    .arrow-active { stroke: #E76F51; stroke-width: 3; fill: none; marker-end: url(#arrow-coral); }
  </style>
  <defs>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#52525B"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#E76F51"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="880" height="760"/>

  <!-- ============ B col-band (top) ============ -->
  <!-- BLOCK_N label, above B -->
  <text class="code-muted" x="760" y="48" text-anchor="middle">BLOCK_N</text>

  <!-- B label, rotated vertical to the right of B col -->
  <g transform="translate(826, 300) rotate(-90)">
    <text class="label" x="0" y="0" text-anchor="middle">B</text>
  </g>

  <!-- B col-band: 6 cells (K split into 6 BLOCK_K chunks); middle one (k=2) coral -->
  <rect class="cell"        x="720" y="60"  width="80" height="80"/>
  <rect class="cell"        x="720" y="140" width="80" height="80"/>
  <rect class="cell-active" x="720" y="220" width="80" height="80"/>
  <rect class="cell"        x="720" y="300" width="80" height="80"/>
  <rect class="cell"        x="720" y="380" width="80" height="80"/>
  <rect class="cell"        x="720" y="460" width="80" height="80"/>

  <!-- ============ A row-band (bottom-left) ============ -->
  <!-- A label, above-left of A row -->
  <text class="label" x="80" y="568">A</text>

  <!-- BLOCK_M label, rotated left of A band -->
  <g transform="translate(60, 620) rotate(-90)">
    <text class="code-muted" x="0" y="0" text-anchor="middle">BLOCK_M</text>
  </g>

  <!-- BLOCK_K label, above the active A cell (k=2, x=280..380) -->
  <text class="code-muted" x="330" y="568" text-anchor="middle">BLOCK_K</text>

  <!-- A row-band: 6 cells; middle one (k=2) coral -->
  <rect class="cell"        x="80"  y="580" width="100" height="80"/>
  <rect class="cell"        x="180" y="580" width="100" height="80"/>
  <rect class="cell-active" x="280" y="580" width="100" height="80"/>
  <rect class="cell"        x="380" y="580" width="100" height="80"/>
  <rect class="cell"        x="480" y="580" width="100" height="80"/>
  <rect class="cell"        x="580" y="580" width="100" height="80"/>

  <!-- K axis arrow under A -->
  <line class="arrow-muted" x1="80" y1="690" x2="680" y2="690"/>
  <text class="code-muted" x="380" y="718" text-anchor="middle">K</text>

  <!-- ============ acc (bottom-right) ============ -->
  <rect class="cell" x="720" y="580" width="80" height="80"/>
  <text class="label" x="760" y="627" text-anchor="middle">acc</text>

  <!-- ============ tl.dot, connecting active chunks into acc ============ -->
  <!-- Short coral arrows that bridge each active chunk's edge to acc's edge -->
  <line class="arrow-active" x1="680" y1="620" x2="718" y2="620"/>
  <line class="arrow-active" x1="760" y1="540" x2="760" y2="578"/>

  <!-- tl.dot label at the elbow where the two arrows meet acc -->
  <text class="code" x="710" y="565" text-anchor="end">tl.dot</text>
</svg>
