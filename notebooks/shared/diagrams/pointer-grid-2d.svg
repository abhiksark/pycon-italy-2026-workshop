<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Inter, system-ui, Arial, sans-serif">
  <style>
    .bg          { fill: #FAFAFA; }
    .cell        { fill: #F4F4F5; stroke: #18181B; stroke-width: 2; }
    .cell-active { fill: #E76F51; stroke: #18181B; stroke-width: 2; }
    .label       { font-family: 'Inter', 'Arial', sans-serif; font-size: 16px; font-weight: 600; fill: #18181B; }
    .label-muted { font-family: 'Inter', 'Arial', sans-serif; font-size: 14px; font-weight: 600; fill: #52525B; }
    .code        { font-family: 'JetBrains Mono', 'Source Code Pro', monospace; font-size: 16px; fill: #18181B; }
    .code-muted  { font-family: 'JetBrains Mono', 'Source Code Pro', monospace; font-size: 15px; fill: #52525B; }
    .arrow       { stroke: #52525B; stroke-width: 2; fill: none; marker-end: url(#arrow-muted); }
  </style>
  <defs>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#52525B"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="700" height="600"/>

  <!-- stride_n →  arrow above the column header row -->
  <line class="arrow" x1="200" y1="60" x2="600" y2="60"/>
  <text class="code-muted" x="400" y="44" text-anchor="middle">stride_n</text>

  <!-- stride_m ↓  arrow left of the row header column -->
  <line class="arrow" x1="80" y1="140" x2="80" y2="540"/>
  <g transform="translate(58, 340) rotate(-90)">
    <text class="code-muted" x="0" y="0" text-anchor="middle">stride_m</text>
  </g>

  <!-- column headers: offs_n[0..3] -->
  <g class="code" text-anchor="middle">
    <text x="250" y="115">offs_n[0]</text>
    <text x="350" y="115">offs_n[1]</text>
    <text x="450" y="115">offs_n[2]</text>
    <text x="550" y="115">offs_n[3]</text>
  </g>

  <!-- row headers: offs_m[0..3] -->
  <g class="code" text-anchor="end">
    <text x="190" y="195">offs_m[0]</text>
    <text x="190" y="295">offs_m[1]</text>
    <text x="190" y="395">offs_m[2]</text>
    <text x="190" y="495">offs_m[3]</text>
  </g>

  <!-- 4×4 grid: 15 idle cells + 1 masked corner (bottom-right) drawn as cell-active (coral) -->
  <!-- row 0 -->
  <rect class="cell" x="200" y="140" width="100" height="100"/>
  <rect class="cell" x="300" y="140" width="100" height="100"/>
  <rect class="cell" x="400" y="140" width="100" height="100"/>
  <rect class="cell" x="500" y="140" width="100" height="100"/>
  <!-- row 1 -->
  <rect class="cell" x="200" y="240" width="100" height="100"/>
  <rect class="cell" x="300" y="240" width="100" height="100"/>
  <rect class="cell" x="400" y="240" width="100" height="100"/>
  <rect class="cell" x="500" y="240" width="100" height="100"/>
  <!-- row 2 -->
  <rect class="cell" x="200" y="340" width="100" height="100"/>
  <rect class="cell" x="300" y="340" width="100" height="100"/>
  <rect class="cell" x="400" y="340" width="100" height="100"/>
  <rect class="cell" x="500" y="340" width="100" height="100"/>
  <!-- row 3 -->
  <rect class="cell"        x="200" y="440" width="100" height="100"/>
  <rect class="cell"        x="300" y="440" width="100" height="100"/>
  <rect class="cell"        x="400" y="440" width="100" height="100"/>
  <rect class="cell-active" x="500" y="440" width="100" height="100"/>
</svg>
